<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}축의금 정리{% endblock %}</title>

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="app-brand">
                <img
                    src="{{ url_for('static', filename='icons/diamond-ring.png') }}"
                    alt=""
                    class="app-title-icon"
                >
                <span class="app-title-text">축의금 관리</span>
            </div>

            <a href="{{ url_for('export_excel') }}" class="header-export-button">
                <i class="bi bi-file-earmark-spreadsheet"></i>
                <span>엑셀 다운로드</span>
            </a>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <nav class="bottom-nav">
            <a href="{{ url_for('input_page') }}" class="{% if request.endpoint == 'input_page' %}active{% endif %}">
                <i class="bi bi-pencil-square"></i>
                <span>입력</span>
            </a>

            <a href="{{ url_for('records_page') }}" class="{% if request.endpoint == 'records_page' %}active{% endif %}">
                <i class="bi bi-list-ul"></i>
                <span>내역</span>
            </a>

            <a href="{{ url_for('summary_page') }}" class="{% if request.endpoint == 'summary_page' %}active{% endif %}">
                <i class="bi bi-clipboard-data"></i>
                <span>요약</span>
            </a>
        </nav>
    </div>
</body>
</html>
